# Production-ish work-stealing configuration.
# Each worker GPU has its own job queue; idle workers steal from the
# most-loaded peer queue when the imbalance exceeds steal_threshold.

gpus:
  ids: [0, 1, 2, 3]
  worker_gpus: [0, 1, 2, 3]
  neighbors:
    0: [1]
    1: [0, 2]
    2: [1, 3]
    3: [2]

scheduler:
  name: work_stealing
  work_stealing:
    target_util_low: 50.0     # below this, GPU is treated as fully available
    target_util_high: 70.0    # above this, latency degrades sharply
    steal_threshold: 2        # min queue-length imbalance needed to steal

monitor:
  backend: simulated          # change to nvml on real hardware
  sample_hz: 10
  simulated:
    ambient_c: 25
    k_load: 0.6
    k_cool: 0.05
    k_neighbor: 0.1

arrival_rate_hz: 2

workload_mix:
  - {type: ptq, count: 100, mem_required_mb: 2048}
  - {type: training, count: 50, mem_required_mb: 16384, num_steps: 500}

output_dir: ./runs

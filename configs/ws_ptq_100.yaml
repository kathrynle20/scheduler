# Experiment 1 (work stealing): 100 PTQ inference jobs only.
# 2-GPU setup for Engaging cluster (mit_normal_gpu default quota).
#
# matrix_size=16384 makes each matmul ~24ms on L40S (realistic for large
# quantized model inference). num_requests=100 makes each job ~2.4s so
# queues build up and stealing is triggered.
gpus:
  ids: [0, 1]
  worker_gpus: [0, 1]
  neighbors:
    0: [1]
    1: [0]

scheduler:
  name: work_stealing
  work_stealing:
    target_util_low: 50.0
    target_util_high: 70.0
    steal_threshold: 2

monitor:
  backend: nvml
  sample_hz: 10
  simulated:
    ambient_c: 25
    k_load: 0.6
    k_cool: 0.05
    k_neighbor: 0.1

arrival_rate_hz: 2

workload_mix:
  - {type: ptq, count: 100, mem_required_mb: 4096, num_requests: 100, matrix_size: 16384}

output_dir: ./runs

# Experiment 3 (baseline): 100 PTQ + 50 training jobs (500 steps each), interleaved.
# 2-GPU setup for Engaging cluster (mit_normal_gpu default quota).
gpus:
  ids: [0, 1]
  worker_gpus: [0, 1]
  neighbors:
    0: [1]
    1: [0]

scheduler:
  name: baseline

monitor:
  backend: nvml
  sample_hz: 10
  simulated:
    ambient_c: 25
    k_load: 0.6
    k_cool: 0.05
    k_neighbor: 0.1

arrival_rate_hz: 2.0
poisson_arrivals: true

workload_mix:
  - {type: ptq,      count: 100, mem_required_mb: 4096, num_requests: 20, matrix_size: 16384}
  - {type: training, count: 50,  num_steps: 500, mem_required_mb: 16384}

output_dir: ./runs

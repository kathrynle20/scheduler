# Experiment 1 (no-steal baseline): 100 PTQ inference jobs only.
# 2-GPU setup for Engaging cluster (mit_normal_gpu default quota).
#
# Arrival design:
#   burst_arrivals: jobs land in groups of 4 every 2.5s.  In real inference
#   serving, requests are often batched by a gateway before dispatch — this
#   models that pattern.  More importantly, it creates a queue of 2 jobs per
#   GPU per burst, so request-count variance (see below) has room to cause
#   imbalance that stealing can act on.  With one-at-a-time Poisson arrivals,
#   JSQ sees the true queue depth before every decision and stays close to
#   optimal; variance rarely accumulates enough for stealing to help.
#
# Workload variance:
#   num_requests_min/max: each job draws its request count uniformly from
#   [10, 30] at arrival time (~0.47–1.41s execution, mean 0.94s).  Real
#   inference requests vary in complexity; this models that.  The variance
#   is the reason JSQ-no-steal can be suboptimal: it assigns jobs by queue
#   length, not by expected duration, so a GPU can end up with two long jobs
#   while its peer finishes two short ones and idles.
#
# Utilization: mean 20 req × 47ms = 0.94s/job; 4 jobs per 2.5s burst across
# 2 GPUs → (2 jobs × 0.94s) / 2.5s ≈ 75% per GPU.
#
# ARCHITECTURE: steal_threshold=99999 disables stealing — JSQ placement only.
gpus:
  ids: [0, 1]
  worker_gpus: [0, 1]
  neighbors:
    0: [1]
    1: [0]

scheduler:
  name: work_stealing
  work_stealing:
    steal_threshold: 99999  # effectively disables stealing — baseline comparison mode

monitor:
  backend: nvml
  sample_hz: 10
  simulated:
    ambient_c: 25
    k_load: 0.6
    k_cool: 0.05
    k_neighbor: 0.1

burst_arrivals: true
burst_size: 4
burst_interval_s: 2.5

workload_mix:
  - {type: ptq, count: 100, mem_required_mb: 4096, num_requests_min: 10, num_requests_max: 30, matrix_size: 16384}

output_dir: ./runs

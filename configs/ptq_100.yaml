# Experiment 1 (baseline): 100 PTQ inference jobs only.
# 2-GPU setup for Engaging cluster (mit_normal_gpu default quota).
#
# Sizing rationale (targeting ~60% GPU utilization):
#   matrix_size=16384   → measured ~47ms/matmul on L40S
#   num_requests=25     → ~1.175s/job  (25 × 47ms)
#   arrival_rate_hz=1.0 → 1 job/sec across 2 GPUs
#   mean util ≈ (1.0/2) × 1.175 = 0.59  →  ~60% per GPU
#
# poisson_arrivals: true uses exponentially distributed inter-arrival gaps
# (Poisson process) instead of even spacing. This is realistic for inference
# traffic and creates the burst imbalance that work stealing acts on.
gpus:
  ids: [0, 1]
  worker_gpus: [0, 1]
  neighbors:
    0: [1]
    1: [0]

scheduler:
  name: baseline

monitor:
  backend: nvml
  sample_hz: 10
  simulated:
    ambient_c: 25
    k_load: 0.6
    k_cool: 0.05
    k_neighbor: 0.1

arrival_rate_hz: 1.0
poisson_arrivals: true

workload_mix:
  - {type: ptq, count: 100, mem_required_mb: 4096, num_requests: 25, matrix_size: 16384}

output_dir: ./runs

# Tiny config for smoke-testing the scaffold end-to-end.
gpus:
  ids: [0, 1]
  # GPU 0 schedules; GPU 1 runs workloads.
  scheduler_gpu: 0
  worker_gpus: [1]
  neighbors:
    0: [1]
    1: [0]

scheduler:
  name: baseline

monitor:
  backend: simulated
  sample_hz: 20

arrival_rate_hz: 5              # jobs/sec — all job types randomly interspersed

workload_mix:
  - {type: ptq, count: 3, mem_required_mb: 512, num_requests: 3}
  - {type: training, count: 1, num_steps: 10, mem_required_mb: 1024}

output_dir: ./runs

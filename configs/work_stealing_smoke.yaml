# Tiny work-stealing smoke test -- mirror of smoke.yaml.
gpus:
  ids: [0, 1]
  worker_gpus: [0, 1]
  neighbors:
    0: [1]
    1: [0]

scheduler:
  name: work_stealing
  work_stealing:
    target_util_low: 50.0
    target_util_high: 70.0
    steal_threshold: 2

monitor:
  backend: simulated
  sample_hz: 20

arrival_rate_hz: 5

workload_mix:
  - {type: ptq, count: 6, mem_required_mb: 512, num_requests: 3}
  - {type: training, count: 2, num_steps: 10, mem_required_mb: 1024}

output_dir: ./runs
